name: Pull Request Validation

on:
  pull_request:
    branches:
      - main
      - develop

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  validate-backend:
    name: Validate Backend Changes
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'backend/') || contains(github.event.pull_request.changed_files, 'infrastructure/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linting
        run: |
          cd backend
          flake8 src/ --max-line-length=120 --exclude=__pycache__ || echo "Linting not configured"

      - name: Run type checking
        run: |
          cd backend
          mypy src/ --ignore-missing-imports || echo "Type checking not configured"

      - name: Run unit tests
        run: |
          cd backend
          pytest src/ -v --tb=short --ignore=src/chat/test_handler.py --ignore=src/voice/test_voice_to_text_handler.py --ignore=src/voice/test_text_to_speech_handler.py

      - name: Validate SAM template
        run: |
          pip install aws-sam-cli
          cd infrastructure
          sam validate

      - name: Check for secrets
        run: |
          if grep -r "AKIA" backend/ infrastructure/; then
            echo "❌ AWS credentials found in code!"
            exit 1
          fi
          echo "✅ No secrets detected"

  validate-frontend:
    name: Validate Frontend Changes
    runs-on: ubuntu-latest
    if: contains(github.event.pull_request.changed_files, 'frontend/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint

      - name: Run Prettier check
        run: |
          cd frontend
          npx prettier --check "src/**/*.{ts,tsx,css}"

      - name: Run type check
        run: |
          cd frontend
          npx tsc --noEmit

      - name: Build check
        run: |
          cd frontend
          npm run build

      - name: Check bundle size
        run: |
          cd frontend
          BUNDLE_SIZE=$(du -sb dist | cut -f1)
          MAX_SIZE=5242880  # 5MB
          if [ $BUNDLE_SIZE -gt $MAX_SIZE ]; then
            echo "⚠️ Warning: Bundle size ($BUNDLE_SIZE bytes) exceeds recommended maximum ($MAX_SIZE bytes)"
          else
            echo "✅ Bundle size: $BUNDLE_SIZE bytes"
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [validate-backend, validate-frontend, security-scan]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## Pull Request Validation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.validate-backend.result }}" == "success" ]; then
            echo "✅ Backend validation passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.validate-backend.result }}" == "skipped" ]; then
            echo "⏭️ Backend validation skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Backend validation failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.validate-frontend.result }}" == "success" ]; then
            echo "✅ Frontend validation passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.validate-frontend.result }}" == "skipped" ]; then
            echo "⏭️ Frontend validation skipped (no changes)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Frontend validation failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.security-scan.result }}" == "success" ]; then
            echo "✅ Security scan passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Security scan failed" >> $GITHUB_STEP_SUMMARY
          fi
